<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 聊天代理</title>
    <!-- Font Awesome 免费图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f23; color: #e0e0e0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 800px; height: 100vh; display: flex; flex-direction: column; background: #0f0f23; position: relative; }

        #loginPage { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; gap: 20px; }
        #loginPage h1 { font-size: 2.2rem; background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #loginPage p { color: #888; font-size: 14px; margin-bottom: 10px; }
        .login-box { background: #1a1a3e; padding: 30px 35px; border-radius: 16px; width: 100%; max-width: 380px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .login-box label { display: block; margin-bottom: 6px; font-size: 14px; color: #ccc; }
        .login-box input[type="password"] { width: 100%; padding: 12px 16px; background: #0f0f23; border: 1px solid #3a3a6e; border-radius: 10px; color: #e0e0e0; font-size: 16px; outline: none; }
        .login-box input:focus { border-color: #7c3aed; }
        .login-box button { width: 100%; margin-top: 18px; padding: 14px; background: linear-gradient(135deg, #7c3aed, #a78bfa); border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .login-box button:hover { opacity: 0.85; }
        .login-error { color: #f87171; font-size: 14px; margin-top: 12px; text-align: center; }

        #chatPage { display: none; flex-direction: column; height: 100%; }
        .header { padding: 16px 20px; background: #1a1a3e; border-bottom: 1px solid #2a2a5e; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; flex-wrap: wrap; gap: 8px; }
        .header h1 { font-size: 18px; display: flex; align-items: center; gap: 8px; color: #a78bfa; }
        .header h1 i { font-size: 20px; }
        .model-select { display: flex; align-items: center; gap: 8px; font-size: 13px; flex-wrap: wrap; }
        .model-select select { padding: 6px 12px; background: #2a2a5e; color: #e0e0e0; border: 1px solid #3a3a6e; border-radius: 6px; font-size: 13px; cursor: pointer; outline: none; }
        .model-select select:focus { border-color: #7c3aed; }
        .logout-btn { background: transparent; border: 1px solid #3a3a6e; color: #aaa; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .logout-btn:hover { border-color: #f87171; color: #f87171; }

        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .msg { display: flex; gap: 12px; max-width: 85%; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: #2a2a5e; }
        .msg.user .avatar { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
        .msg.bot .avatar { background: linear-gradient(135deg, #059669, #10b981); }
        .msg .bubble { padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 15px; word-break: break-word; }
        .msg.user .bubble { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
        .msg.bot .bubble { background: #1e1e3f; border-bottom-left-radius: 4px; }
        .msg.error .bubble { background: #3f1e1e; color: #f87171; border: 1px solid #7f1d1d; }
        .msg.loading .bubble { display: flex; gap: 6px; align-items: center; }
        .msg.loading .bubble i { font-size: 20px; color: #a78bfa; animation: spin 1.2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .input-area { padding: 16px 20px; background: #1a1a3e; border-top: 1px solid #2a2a5e; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
        .input-area textarea { flex: 1; padding: 12px 16px; background: #0f0f23; border: 1px solid #3a3a6e; border-radius: 12px; color: #e0e0e0; font-size: 15px; resize: none; outline: none; line-height: 1.5; max-height: 150px; font-family: system-ui; }
        .input-area textarea:focus { border-color: #7c3aed; }
        .input-area textarea::placeholder { color: #666; }
        .input-area button { padding: 12px 20px; background: linear-gradient(135deg, #7c3aed, #a78bfa); color: #fff; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
        .input-area button:hover { opacity: 0.85; }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 600px) { .msg { max-width: 95%; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loginPage">
        <h1><i class="fas fa-robot"></i> AI 代理</h1>
        <p>请输入密码以继续</p>
        <div class="login-box">
            <label for="passwordInput"><i class="fas fa-lock"></i> 密码</label>
            <input type="password" id="passwordInput" placeholder="输入访问密码" />
            <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> 登录</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>
    <div id="chatPage">
        <div class="header">
            <h1><i class="fas fa-robot"></i> AI Chat</h1>
            <div class="model-select">
                <span style="color:#888;"><i class="fas fa-cube"></i> 模型</span>
                <select id="modelSelect">
                    <option value="minimaxai/minimax-m3">MiniMax M3</option>
                    <option value="qwen/qwen3.5-122b-a10b">Qwen 3.5 122B</option>
                    <option value="z-ai/glm-5.1">GLM-5.1</option>
                    <option value="stepfun-ai/step-3.7-flash">Step 3.7 Flash</option>
                    <option value="meta/llama-4-maverick-17b-128e-instruct">Llama 4 Maverick</option>
                    <option value="meta/llama-3.3-70b-instruct" selected>Llama 3.3 70B</option>
                    <option value="deepseek-ai/deepseek-v4-flash">DeepSeek V4 Flash</option>
                    <option value="nvidia/nemotron-3-super-120b-a12b">Nemotron Super 120B</option>
                    <option value="nvidia/nemotron-3-nano-30b-a3b">Nemotron Nano 30B</option>
                </select>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </div>
        <div class="messages" id="messages">
            <div class="msg bot">
                <div class="avatar"><i class="fas fa-robot"></i></div>
                <div class="bubble">你好！我是 AI 助手。选择模型后输入问题即可。</div>
            </div>
        </div>
        <div class="input-area">
            <textarea id="inputArea" placeholder="输入消息… (Shift+Enter 换行，Enter 发送)" rows="1"></textarea>
            <button id="sendBtn"><i class="fas fa-paper-plane"></i> 发送</button>
        </div>
    </div>
</div>
<script>
    // ============================================================
    // ⚙️ 配置区：请修改为你的后端 Worker 地址（必须包含协议）
    // ============================================================
    const API_BASE = 'https://ai-chat.tszxzy.dpdns.org';   // 例如 'https://ai.tszxzy.dpdns.org'

    // 以下代码无需修改
    const loginPage = document.getElementById('loginPage');
    const chatPage = document.getElementById('chatPage');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const messages = document.getElementById('messages');
    const inputArea = document.getElementById('inputArea');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');
    const logoutBtn = document.getElementById('logoutBtn');

    let token = localStorage.getItem('ai_token') || '';
    let loading = false;

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function addMessage(role, content, cls = '') {
        const div = document.createElement('div');
        div.className = 'msg ' + role + ' ' + cls;
        const icon = role === 'user' ? 'fa-user' : 'fa-robot';
        div.innerHTML = '<div class="avatar"><i class="fas ' + icon + '"></i></div><div class="bubble">' + content + '</div>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
    }

    function setLoading(show) {
        loading = show;
        sendBtn.disabled = show;
        if (show) {
            const div = document.createElement('div');
            div.className = 'msg bot loading';
            div.innerHTML = '<div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble"><i class="fas fa-spinner"></i> 思考中…</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        } else {
            const items = messages.querySelectorAll('.msg.loading');
            if (items.length) items[items.length - 1].remove();
            return null;
        }
    }

    function showPage(showChat) {
        loginPage.style.display = showChat ? 'none' : 'flex';
        chatPage.style.display = showChat ? 'flex' : 'none';
    }

    async function doLogin(password) {
        try {
            const resp = await fetch(API_BASE + '/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await resp.json();
            if (resp.ok && data.token) {
                token = data.token;
                localStorage.setItem('ai_token', token);
                loginError.textContent = '';
                showPage(true);
                return true;
            } else {
                loginError.textContent = data.error || '登录失败';
                return false;
            }
        } catch (e) {
            loginError.textContent = '网络错误: ' + e.message;
            return false;
        }
    }

    function initToken() {
        if (token) {
            showPage(true);
        } else {
            showPage(false);
        }
    }

    function logout() {
        localStorage.removeItem('ai_token');
        token = '';
        showPage(false);
        passwordInput.value = '';
        loginError.textContent = '';
    }

    async function sendMessage() {
        if (loading) return;
        const text = inputArea.value.trim();
        if (!text) return;
        addMessage('user', escapeHtml(text));
        inputArea.value = '';
        inputArea.style.height = 'auto';
        setLoading(true);

        try {
            const resp = await fetch(API_BASE + '/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    model: modelSelect.value,
                    messages: [{ role: 'user', content: text }],
                    max_tokens: 2048
                })
            });

            if (resp.status === 401) {
                setLoading(false);
                logout();
                loginError.textContent = '会话已过期，请重新登录';
                return;
            }

            const data = await resp.json();
            setLoading(false);
            if (data.error) {
                addMessage('bot', '错误: ' + (data.error.message || JSON.stringify(data.error)), 'error');
            } else if (data.choices && data.choices[0]) {
                const content = data.choices[0].message.content || '(无回复)';
                addMessage('bot', escapeHtml(content));
            } else {
                addMessage('bot', escapeHtml(JSON.stringify(data, null, 2)));
            }
        } catch (e) {
            setLoading(false);
            addMessage('bot', '网络错误: ' + e.message, 'error');
        }
    }

    loginBtn.addEventListener('click', () => {
        const pwd = passwordInput.value.trim();
        if (!pwd) { loginError.textContent = '请输入密码'; return; }
        doLogin(pwd);
    });
    passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); loginBtn.click(); } });
    sendBtn.addEventListener('click', sendMessage);
    inputArea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
    });
    inputArea.addEventListener('input', () => {
        inputArea.style.height = 'auto';
        inputArea.style.height = Math.min(inputArea.scrollHeight, 150) + 'px';
    });
    logoutBtn.addEventListener('click', logout);

    window.addEventListener('load', initToken);
</script>
</body>
</html>
