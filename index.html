<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui;background:#0f0f23;color:#e0e0e0;height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:800px;margin:0 auto}
.header{padding:14px 16px;background:#1a1a3e;border-bottom:1px solid #2a2a5e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:17px;color:#a78bfa;font-weight:600;display:flex;align-items:center;gap:7px}
select{padding:5px 8px;background:#2a2a5e;color:#e0e0e0;border:1px solid #3a3a6e;border-radius:6px;font-size:12px;cursor:pointer;max-width:130px}
.logout-btn{font-size:12px;color:#888;cursor:pointer;background:none;border:none;padding:4px 8px}
.login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px}
.login-logo{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;align-items:center;justify-content:center}
.login-screen h2{font-size:22px;color:#a78bfa;font-weight:600}
.login-screen .subtitle{font-size:14px;color:#666;margin-top:-10px}
.login-screen input{padding:14px 18px;font-size:16px;background:#1a1a3e;border:2px solid #3a3a6e;border-radius:12px;color:#e0e0e0;outline:none;width:100%;max-width:320px;text-align:center}
.login-screen input:focus{border-color:#667eea}
.login-screen .login-btn{padding:14px 40px;font-size:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:600;width:100%;max-width:320px}
.login-error{color:#f87171;font-size:14px;display:none;height:20px}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg.user .avatar{background:linear-gradient(135deg,#667eea,#764ba2)}
.msg.bot .avatar{background:linear-gradient(135deg,#10b981,#059669)}
.msg .bubble{padding:10px 14px;border-radius:14px;line-height:1.6;font-size:15px;word-break:break-word;white-space:pre-wrap}
.msg.user .bubble{background:#667eea;color:#fff;border-bottom-right-radius:4px}
.msg.bot .bubble{background:#1e1e3f;color:#e0e0e0;border-bottom-left-radius:4px}
.msg.error .bubble{background:#3f1e1e;color:#f87171;border:1px solid #7f1d1d}
.input-area{flex-shrink:0;padding:10px 12px 14px;background:#1a1a3e;border-top:1px solid #2a2a5e;display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;padding:10px 14px;background:#0f0f23;border:1px solid #3a3a6e;border-radius:10px;color:#e0e0e0;font-size:15px;resize:none;outline:none;line-height:1.5;max-height:120px;font-family:inherit}
textarea:focus{border-color:#667eea}
textarea::placeholder{color:#555}
.send-btn{padding:10px 18px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.loading-dots span{width:7px;height:7px;border-radius:50%;background:#a78bfa;animation:bounce 1.4s infinite ease-in-out both}
.loading-dots span:nth-child(2){animation-delay:.16s}
.loading-dots span:nth-child(3){animation-delay:.32s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="icon-robot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="10" rx="2"/>
    <circle cx="12" cy="5" r="2"/>
    <path d="M12 7v4"/>
    <line x1="8" y1="16" x2="8" y2="16.01"/>
    <line x1="16" y1="16" x2="16" y2="16.01"/>
    <path d="M8 15h8"/>
  </symbol>
  <symbol id="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="22" y1="2" x2="11" y2="13"/>
    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
  </symbol>
  <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    <circle cx="12" cy="7" r="4"/>
  </symbol>
</svg>

<div class="header" id="header" style="display:none">
  <h1><svg width="20" height="20" fill="none" stroke="#a78bfa" stroke-width="1.8"><use href="#icon-robot"/></svg> AI Chat</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <select id="modelSelect">
      <option value="minimaxai/minimax-m3">MiniMax M3</option>
      <option value="qwen/qwen3.5-122b-a10b">Qwen 3.5 122B</option>
      <option value="z-ai/glm-5.1">GLM-5.1</option>
      <option value="stepfun-ai/step-3.7-flash">Step 3.7 Flash</option>
      <option value="meta/llama-4-maverick-17b-128e-instruct">Llama 4 Maverick</option>
      <option value="meta/llama-3.3-70b-instruct">Llama 3.3 70B</option>
      <option value="deepseek-ai/deepseek-v4-flash">DeepSeek V4 Flash</option>
    </select>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
</div>

<div class="login-screen" id="loginScreen">
  <div class="login-logo"><svg width="28" height="28" fill="none" stroke="#fff" stroke-width="1.8"><use href="#icon-robot"/></svg></div>
  <h2>AI Chat</h2>
  <p class="subtitle">NVIDIA NIM 中转</p>
  <input type="password" id="pw" placeholder="输入访问密码" autocomplete="off">
  <div class="login-error" id="loginError"></div>
  <button class="login-btn" onclick="login()">进入</button>
</div>

<div class="chat-area" id="chatArea" style="display:none">
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="avatar"><svg width="16" height="16" fill="none" stroke="#fff" stroke-width="1.8"><use href="#icon-robot"/></svg></div>
      <div class="bubble">已连接。选择模型后开始聊天。</div>
    </div>
  </div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="输入消息..."></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><use href="#icon-send"/></svg></button>
  </div>
</div>

<script>
const API = "https://ai.tszxzy.dpdns.org";
let token = localStorage.getItem("ai_token"), loading = false;
const msgs = document.getElementById("messages"), input = document.getElementById("input"), sendBtn = document.getElementById("sendBtn");

input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 120) + "px"; });
input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });

function esc(t) { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

function addMsg(role, content, cls) {
  cls = cls || "";
  const div = document.createElement("div");
  div.className = "msg " + role + " " + cls;
  const botIcon = `<svg width="14" height="14" fill="none" stroke="#fff" stroke-width="1.8"><use href="#icon-robot"/></svg>`;
  const userIcon = `<svg width="14" height="14" fill="none" stroke="#fff" stroke-width="1.8"><use href="#icon-user"/></svg>`;
  div.innerHTML = `<div class="avatar">${role === "user" ? userIcon : botIcon}</div><div class="bubble">${content}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showLoad() {
  loading = true; sendBtn.disabled = true;
  const el = addMsg("bot", "", "loading");
  el.querySelector(".bubble").innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
}
function hideLoad() {
  loading = false; sendBtn.disabled = false;
  const last = msgs.querySelector(".msg.bot:last-child");
  if (last && last.classList.contains("loading")) last.remove();
}

async function login() {
  const pwd = document.getElementById("pw").value.trim();
  if (!pwd) return;
  document.getElementById("loginError").style.display = "none";
  try {
    const r = await fetch(API + "/login", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({password: pwd}) });
    const d = await r.json();
    if (r.ok && d.token) {
      token = d.token;
      localStorage.setItem("ai_token", token);
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("chatArea").style.display = "flex";
      document.getElementById("header").style.display = "flex";
    } else {
      const el = document.getElementById("loginError");
      el.textContent = "密码错误";
      el.style.display = "block";
    }
  } catch(e) {
    const el = document.getElementById("loginError");
    el.textContent = "连接失败: " + e.message;
    el.style.display = "block";
  }
}

document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") login(); });

function logout() {
  localStorage.removeItem("ai_token");
  location.reload();
}

async function send() {
  if (loading) return;
  const text = input.value.trim();
  if (!text) return;
  addMsg("user", esc(text));
  input.value = "";
  input.style.height = "auto";
  showLoad();
  try {
    const r = await fetch(API + "/v1/chat/completions", {
      method: "POST",
      headers: {"Content-Type":"application/json", "Authorization": "Bearer " + token},
      body: JSON.stringify({ model: document.getElementById("modelSelect").value, messages: [{role:"user", content:text}], max_tokens: 2048 })
    });
    const d = await r.json();
    hideLoad();
    if (d.error) {
      addMsg("bot", "错误: " + esc(d.error.message || JSON.stringify(d.error)), "error");
    } else if (d.choices && d.choices[0]) {
      addMsg("bot", esc(d.choices[0].message.content || "(无回复)"));
    } else {
      addMsg("bot", esc(JSON.stringify(d, null, 2)));
    }
  } catch(e) {
    hideLoad();
    addMsg("bot", "网络错误: " + esc(e.message), "error");
  }
}

if (token) {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("chatArea").style.display = "flex";
  document.getElementById("header").style.display = "flex";
}
</script>
</body>
</html>
